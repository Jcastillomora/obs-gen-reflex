
services:
  app:
    image: local/reflex-app
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - db-data:/app/data
      - upload-data:/app/OCDE/assets/uploads
      - static-data:/app/.web/build/client
      - /home/admobge/obs-gen-reflex/OCDE/backend/:/app/OCDE/backend/
    restart: always

  webserver:
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - static-data:/srv:ro
    restart: always
    depends_on:
      - app

volumes:
  db-data:
  upload-data:
  caddy-data:
  caddy-config:
  static-data:
