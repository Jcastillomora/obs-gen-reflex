services:
  app:
    image: local/reflex-app
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    volumes:
      - db-data:/app/data
      - ./assets/uploads:/app/assets/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  webserver:
    image: local/reflex-caddy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./assets/uploads:/srv/uploads
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

volumes:
  db-data:
  caddy-data:
  caddy-config:
