
services:
  app:
    image: local/reflex-app
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    volumes:
      - db-data:/app/data
      - ./assets/uploads:/app/assets/uploads
    restart: always

  webserver:
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./assets/uploads:/srv/uploads
    restart: always
    depends_on:
      - app

volumes:
  db-data:
  caddy-data:
  caddy-config:
